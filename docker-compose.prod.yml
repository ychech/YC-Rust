version: '3.8'

# 生产环境 Docker Compose 配置
# 支持多节点集群部署

services:
  # 种子节点（Bootstrap）
  seed-node:
    build: .
    container_name: yrust-seed-node
    restart: always
    ports:
      - "9090:9090"    # P2P端口
      - "8080:8080"    # API端口
    environment:
      - NODE_ROLE=seed
      - NODE_ID=seed-1
      - P2P_PORT=9090
      - API_PORT=8080
      - RUST_LOG=info
      - NETWORK_ID=yrust-mainnet
    volumes:
      - seed-data:/data
      - ./config:/app/config:ro
      - ./logs/seed:/app/logs
    networks:
      - yrust-cluster
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # 验证者节点1
  validator-1:
    build: .
    container_name: yrust-validator-1
    restart: always
    ports:
      - "9091:9090"
      - "8081:8080"
    environment:
      - NODE_ROLE=validator
      - NODE_ID=validator-1
      - P2P_PORT=9090
      - API_PORT=8080
      - SEED_NODES=/dns4/seed-node/tcp/9090
      - RUST_LOG=info
      - IS_VALIDATOR=true
    volumes:
      - validator1-data:/data
      - ./config:/app/config:ro
      - ./logs/validator1:/app/logs
    networks:
      - yrust-cluster
    depends_on:
      - seed-node
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # 验证者节点2
  validator-2:
    build: .
    container_name: yrust-validator-2
    restart: always
    ports:
      - "9092:9090"
      - "8082:8080"
    environment:
      - NODE_ROLE=validator
      - NODE_ID=validator-2
      - P2P_PORT=9090
      - API_PORT=8080
      - SEED_NODES=/dns4/seed-node/tcp/9090
      - RUST_LOG=info
      - IS_VALIDATOR=true
    volumes:
      - validator2-data:/data
      - ./config:/app/config:ro
      - ./logs/validator2:/app/logs
    networks:
      - yrust-cluster
    depends_on:
      - seed-node
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

  # 全节点（API服务）
  fullnode-1:
    build: .
    container_name: yrust-fullnode-1
    restart: always
    ports:
      - "9093:9090"
      - "8083:8080"
    environment:
      - NODE_ROLE=fullnode
      - NODE_ID=fullnode-1
      - P2P_PORT=9090
      - API_PORT=8080
      - SEED_NODES=/dns4/seed-node/tcp/9090
      - RUST_LOG=info
      - ENABLE_API=true
    volumes:
      - fullnode1-data:/data
      - ./config:/app/config:ro
      - ./logs/fullnode1:/app/logs
    networks:
      - yrust-cluster
    depends_on:
      - seed-node
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  # Nginx负载均衡
  nginx:
    image: nginx:alpine
    container_name: yrust-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - ./website:/usr/share/nginx/html:ro
    networks:
      - yrust-cluster
    depends_on:
      - fullnode-1

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: yrust-prometheus
    restart: always
    ports:
      - "9094:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - yrust-cluster

  # Grafana可视化
  grafana:
    image: grafana/grafana:latest
    container_name: yrust-grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://monitor.yrust.chain
    networks:
      - yrust-cluster

  # ELK日志收集
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: yrust-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - yrust-cluster

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: yrust-logstash
    restart: always
    volumes:
      - ./config/logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logs:/logs:ro
    ports:
      - "5044:5044"
    networks:
      - yrust-cluster
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: yrust-kibana
    restart: always
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - yrust-cluster
    depends_on:
      - elasticsearch

  # 告警管理器
  alertmanager:
    image: prom/alertmanager:latest
    container_name: yrust-alertmanager
    restart: always
    ports:
      - "9095:9093"
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./config/alertmanager/templates:/etc/alertmanager/templates:ro
    networks:
      - yrust-cluster

networks:
  yrust-cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  seed-data:
  validator1-data:
  validator2-data:
  fullnode1-data:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
