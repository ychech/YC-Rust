<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChengGame - 链上冒险</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(0,0,0,0.3);
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 24px; font-weight: 700; color: #e94560; }
        .token-display {
            background: rgba(233, 69, 96, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid #e94560;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
        }
        .hero {
            text-align: center;
            padding: 60px 0;
        }
        .hero h1 {
            font-size: 48px;
            margin-bottom: 16px;
            text-shadow: 0 0 40px rgba(233, 69, 96, 0.5);
        }
        .hero p {
            color: #a0a0a0;
            font-size: 18px;
        }
        .character-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 2px solid rgba(233, 69, 96, 0.3);
        }
        .character-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }
        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #e94560 0%, #533483 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .character-info h2 {
            font-size: 28px;
            margin-bottom: 4px;
        }
        .character-info .level {
            color: #e94560;
            font-weight: 600;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .stat-box {
            background: rgba(0,0,0,0.3);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-box .value {
            font-size: 24px;
            font-weight: 700;
            color: #e94560;
        }
        .stat-box .label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .exp-bar {
            background: rgba(0,0,0,0.3);
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        .exp-fill {
            background: linear-gradient(90deg, #e94560 0%, #533483 100%);
            height: 100%;
            width: 65%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
        }
        .actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .action-btn {
            padding: 20px;
            border-radius: 16px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .action-btn:hover {
            transform: translateY(-4px);
        }
        .btn-pve {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }
        .btn-pvp {
            background: linear-gradient(135deg, #e94560 0%, #533483 100%);
            color: white;
        }
        .btn-equip {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
        }
        .equipment-section {
            margin-top: 30px;
        }
        .equipment-section h3 {
            margin-bottom: 16px;
            color: #e94560;
        }
        .equipment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
        }
        .equipment-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s;
        }
        .equipment-item:hover {
            border-color: #e94560;
            transform: scale(1.05);
        }
        .equipment-item .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .equipment-item .name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .equipment-item .bonus {
            font-size: 12px;
            color: #22c55e;
        }
        .rarity-epic { border-color: #a855f7; }
        .rarity-legendary { border-color: #f59e0b; }
        
        .leaderboard {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 24px;
        }
        .leaderboard h3 {
            margin-bottom: 16px;
            color: #e94560;
        }
        .rank-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            margin-bottom: 8px;
        }
        .rank {
            width: 30px;
            font-weight: 700;
            color: #e94560;
        }
        .rank-name {
            flex: 1;
        }
        .rank-power {
            color: #e94560;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">⚔️ ChengGame</div>
        <div class="token-display">💰 1,250 CGT</div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>链上冒险世界</h1>
            <p>创建角色、战斗升级、收集装备、成为传奇</p>
        </div>

        <div class="character-card">
            <div class="character-header">
                <div class="avatar">🦸</div>
                <div class="character-info">
                    <h2>勇者爱丽丝</h2>
                    <div class="level">Level 12 | 战力: 2,450</div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div class="value">340</div>
                    <div class="label">生命值</div>
                </div>
                <div class="stat-box">
                    <div class="value">85</div>
                    <div class="label">攻击力</div>
                </div>
                <div class="stat-box">
                    <div class="value">42</div>
                    <div class="label">防御力</div>
                </div>
                <div class="stat-box">
                    <div class="value">28</div>
                    <div class="label">胜场</div>
                </div>
            </div>

            <div class="exp-bar">
                <div class="exp-fill">EXP: 650/1000</div>
            </div>

            <div class="actions">
                <button class="action-btn btn-pve" onclick="pve()">👹 挑战怪物</button>
                <button class="action-btn btn-pvp" onclick="pvp()">⚔️ PVP对战</button>
                <button class="action-btn btn-equip" onclick="equip()">🎒 装备</button>
            </div>

            <div class="equipment-section">
                <h3>🎒 已装备</h3>
                <div class="equipment-grid">
                    <div class="equipment-item rarity-epic">
                        <div class="icon">⚔️</div>
                        <div class="name">屠龙剑</div>
                        <div class="bonus">+20 攻击</div>
                    </div>
                    <div class="equipment-item">
                        <div class="icon">🛡️</div>
                        <div class="name">铁盾</div>
                        <div class="bonus">+8 防御</div>
                    </div>
                    <div class="equipment-item rarity-legendary">
                        <div class="icon">💍</div>
                        <div class="name">力量戒指</div>
                        <div class="bonus">+50 攻击</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="leaderboard">
            <h3>🏆 战力排行榜</h3>
            <div class="rank-item">
                <span class="rank">1</span>
                <span class="rank-name">🔥 龙骑士</span>
                <span class="rank-power">3,850 战力</span>
            </div>
            <div class="rank-item">
                <span class="rank">2</span>
                <span class="rank-name">⚡ 雷霆法师</span>
                <span class="rank-power">3,420 战力</span>
            </div>
            <div class="rank-item">
                <span class="rank">3</span>
                <span class="rank-name">🦸 勇者爱丽丝</span>
                <span class="rank-power">2,450 战力</span>
            </div>
            <div class="rank-item">
                <span class="rank">4</span>
                <span class="rank-name">🏹 精灵射手</span>
                <span class="rank-power">2,180 战力</span>
            </div>
            <div class="rank-item">
                <span class="rank">5</span>
                <span class="rank-name">🛡️ 钢铁战士</span>
                <span class="rank-power">1,950 战力</span>
            </div>
        </div>
    </div>

    <script>
        function pve() {
            const monsters = ['史莱姆', '哥布林', '骷髅兵', '狼人', '巨龙'];
            const monster = monsters[Math.floor(Math.random() * monsters.length)];
            const win = Math.random() > 0.3;
            
            if (win) {
                alert(`🎉 战胜${monster}！\n获得 50 经验 + 25 CGT`);
            } else {
                alert(`💀 被${monster}击败...\n获得 5 经验`);
            }
        }
        
        function pvp() {
            alert('⚔️ PVP匹配中...\n\n实际项目连接智能合约匹配对手');
        }
        
        function equip() {
            alert('🎒 打开装备栏\n\n实际项目连接智能合约读取装备');
        }
    </script>
</body>
</html>
