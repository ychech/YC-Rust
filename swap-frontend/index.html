<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChengSwap - DEX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px 16px;
            transition: border-color 0.3s;
        }
        .input-wrapper:focus-within {
            border-color: #667eea;
        }
        input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .token-select {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #f0f0f0;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            color: #333;
        }
        .token-select:hover {
            background: #e0e0e0;
        }
        .swap-arrow {
            display: flex;
            justify-content: center;
            margin: -10px 0;
            position: relative;
            z-index: 1;
        }
        .swap-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #667eea;
            border: 4px solid white;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .swap-btn:hover {
            transform: rotate(180deg);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            color: #666;
            font-size: 14px;
        }
        .info-row .value {
            color: #333;
            font-weight: 600;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: #f0f0f0;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .pool-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .pool-info h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .pool-info .amount {
            font-size: 24px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔁 ChengSwap</h1>
        <p class="subtitle">基于 ChengChain 的去中心化交易所</p>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('swap')">兑换</div>
            <div class="tab" onclick="switchTab('pool')">流动性</div>
        </div>
        
        <!-- 兑换页面 -->
        <div id="swap" class="tab-content active">
            <div class="card">
                <div class="input-group">
                    <label>支付</label>
                    <div class="input-wrapper">
                        <input type="number" id="amountIn" placeholder="0.0" oninput="calculateOut()">
                        <div class="token-select">
                            <span>cUSD</span>
                            <span>▼</span>
                        </div>
                    </div>
                </div>
                
                <div class="swap-arrow">
                    <div class="swap-btn" onclick="swapTokens()">⇅</div>
                </div>
                
                <div class="input-group">
                    <label>接收</label>
                    <div class="input-wrapper">
                        <input type="number" id="amountOut" placeholder="0.0" readonly>
                        <div class="token-select">
                            <span>cETH</span>
                            <span>▼</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="info-row">
                    <span>汇率</span>
                    <span class="value" id="exchangeRate">1 cETH = 500 cUSD</span>
                </div>
                <div class="info-row">
                    <span>滑点容忍度</span>
                    <span class="value">0.5%</span>
                </div>
                <div class="info-row">
                    <span>手续费 (0.3%)</span>
                    <span class="value" id="fee">-</span>
                </div>
            </div>
            
            <button class="submit-btn" onclick="connectWallet()">连接钱包</button>
        </div>
        
        <!-- 流动性页面 -->
        <div id="pool" class="tab-content">
            <div class="pool-info">
                <h3>您的流动性</h3>
                <div class="amount">200 LP</div>
                <div style="margin-top: 10px; opacity: 0.9;">
                    10,000 cUSD + 20 cETH
                </div>
            </div>
            
            <div class="card">
                <div class="input-group">
                    <label>cUSD 数量</label>
                    <div class="input-wrapper">
                        <input type="number" id="amountA" placeholder="0.0" oninput="calculatePair()">
                        <div class="token-select">
                            <span>cUSD</span>
                        </div>
                    </div>
                </div>
                
                <div style="text-align: center; color: #999; margin: 10px 0;">+</div>
                
                <div class="input-group">
                    <label>cETH 数量</label>
                    <div class="input-wrapper">
                        <input type="number" id="amountB" placeholder="0.0" oninput="calculatePair()">
                        <div class="token-select">
                            <span>cETH</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="info-row">
                    <span>预计获得 LP</span>
                    <span class="value" id="lpAmount">-</span>
                </div>
                <div class="info-row">
                    <span>池子占比</span>
                    <span class="value" id="poolShare">-</span>
                </div>
            </div>
            
            <button class="submit-btn" onclick="addLiquidity()">添加流动性</button>
        </div>
    </div>

    <script>
        const pool = { reserveA: 100000, reserveB: 200, totalLP: 4472 };
        let tokenIn = 'cUSD', tokenOut = 'cETH';
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab).classList.add('active');
        }
        
        function calculateOut() {
            const amountIn = parseFloat(document.getElementById('amountIn').value) || 0;
            if (amountIn <= 0) {
                document.getElementById('amountOut').value = '';
                document.getElementById('fee').textContent = '-';
                return;
            }
            
            const fee = 0.003;
            const amountInWithFee = amountIn * (1 - fee);
            
            let amountOut;
            if (tokenIn === 'cUSD') {
                amountOut = (pool.reserveB * amountInWithFee) / (pool.reserveA + amountInWithFee);
            } else {
                amountOut = (pool.reserveA * amountInWithFee) / (pool.reserveB + amountInWithFee);
            }
            
            document.getElementById('amountOut').value = amountOut.toFixed(6);
            document.getElementById('fee').textContent = (amountIn * fee).toFixed(4) + ' ' + tokenIn;
        }
        
        function swapTokens() {
            [tokenIn, tokenOut] = [tokenOut, tokenIn];
            document.querySelectorAll('.token-select span:first-child')[0].textContent = tokenIn;
            document.querySelectorAll('.token-select span:first-child')[1].textContent = tokenOut;
            calculateOut();
        }
        
        function calculatePair() {
            const amountA = parseFloat(document.getElementById('amountA').value) || 0;
            const amountB = parseFloat(document.getElementById('amountB').value) || 0;
            
            if (amountA > 0 && amountB > 0) {
                const lp = Math.sqrt(amountA * amountB);
                document.getElementById('lpAmount').textContent = lp.toFixed(4) + ' LP';
                const share = (lp / (pool.totalLP + lp) * 100).toFixed(4);
                document.getElementById('poolShare').textContent = share + '%';
            }
        }
        
        function connectWallet() {
            const btn = document.querySelector('.submit-btn');
            btn.textContent = '确认兑换';
            btn.onclick = function() {
                alert('兑换成功！实际项目调用智能合约');
            };
        }
        
        function addLiquidity() {
            alert('添加流动性成功！实际项目调用智能合约');
        }
    </script>
</body>
</html>
