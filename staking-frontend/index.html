<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChengStake - 质押挖矿</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 36px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }
        .pool-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        .pool-info .value {
            font-size: 32px;
            font-weight: 700;
        }
        .pool-info .apr {
            margin-top: 8px;
            font-size: 18px;
            color: #a5f3fc;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .stat-value {
            font-weight: 600;
            color: #333;
        }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 18px;
            margin-bottom: 12px;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }
        .reward-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .reward-box .amount {
            font-size: 36px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌾 ChengStake 质押挖矿</h1>
        
        <div class="grid">
            <div class="card">
                <h2>💎 cUSD 质押池</h2>
                <div class="pool-info">
                    <div class="value">$1,234,567 TVL</div>
                    <div class="apr">APR: 125.6%</div>
                </div>
                <div class="stat-row">
                    <span>每区块奖励</span>
                    <span class="stat-value">100 cETH</span>
                </div>
            </div>
            
            <div class="card">
                <h2>➕ 质押</h2>
                <input type="number" id="stakeAmount" placeholder="质押数量">
                <button class="btn btn-primary" onclick="stake()">质押</button>
            </div>
            
            <div class="card">
                <h2>📊 我的质押</h2>
                <div class="reward-box">
                    <div class="amount" id="pendingReward">1,234.5</div>
                    <div>待领取奖励 (cETH)</div>
                </div>
                <button class="btn btn-primary" onclick="harvest()">领取奖励</button>
            </div>
        </div>
    </div>

    <script>
        let pendingReward = 1234.5;
        setInterval(() => {
            pendingReward += 0.2;
            document.getElementById('pendingReward').textContent = pendingReward.toFixed(2);
        }, 1000);
        
        function stake() {
            alert('质押成功！实际项目调用智能合约');
        }
        function harvest() {
            alert(`领取 ${pendingReward.toFixed(2)} cETH 成功！`);
            pendingReward = 0;
        }
    </script>
</body>
</html>
