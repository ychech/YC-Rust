<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChengNFT - NFT市场</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links {
            display: flex;
            gap: 30px;
        }
        .nav-links a {
            color: #94a3b8;
            text-decoration: none;
            transition: color 0.3s;
        }
        .nav-links a:hover {
            color: white;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #ec4899 100%);
            color: white;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }
        .hero {
            text-align: center;
            padding: 60px 0;
        }
        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        .hero p {
            color: #94a3b8;
            font-size: 18px;
        }
        .stats {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-top: 40px;
        }
        .stat h3 {
            font-size: 36px;
            color: #667eea;
        }
        .stat p {
            color: #64748b;
        }
        .section {
            margin-top: 60px;
        }
        .section h2 {
            font-size: 28px;
            margin-bottom: 24px;
        }
        .nft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }
        .nft-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
        }
        .nft-card:hover {
            transform: translateY(-5px);
        }
        .nft-image {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
        }
        .nft-info {
            padding: 20px;
        }
        .nft-info h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }
        .nft-info .creator {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .nft-price {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price {
            font-size: 20px;
            font-weight: 700;
            color: #38ef7d;
        }
        .buy-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .tab {
            padding: 12px 24px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab.active {
            background: #667eea;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">🎨 ChengNFT</div>
        <div class="nav-links">
            <a href="#">市场</a>
            <a href="#">我的NFT</a>
            <a href="#">创建</a>
        </div>
        <button class="btn btn-primary">连接钱包</button>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>发现、收集和出售 NFT</h1>
            <p>ChengChain 上最大的 NFT 市场</p>
            <div class="stats">
                <div class="stat">
                    <h3>12.5K</h3>
                    <p>总交易量</p>
                </div>
                <div class="stat">
                    <h3>8.2K</h3>
                    <p>NFT作品</p>
                </div>
                <div class="stat">
                    <h3>3.1K</h3>
                    <p>创作者</p>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="tabs">
                <div class="tab active">🔥 热门</div>
                <div class="tab">🆕 最新</div>
                <div class="tab">⏰ 拍卖中</div>
                <div class="tab">👤 我的</div>
            </div>
            
            <div class="nft-grid">
                <div class="nft-card">
                    <div class="nft-image">🎨</div>
                    <div class="nft-info">
                        <h3>数字艺术 #001</h3>
                        <p class="creator">@Artist_A</p>
                        <div class="nft-price">
                            <span class="price">500 cETH</span>
                            <button class="buy-btn" onclick="buy()">购买</button>
                        </div>
                    </div>
                </div>
                
                <div class="nft-card">
                    <div class="nft-image" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">🎭</div>
                    <div class="nft-info">
                        <h3>加密朋克 #042</h3>
                        <p class="creator">@CryptoMaster</p>
                        <div class="nft-price">
                            <span class="price">1,200 cETH</span>
                            <button class="buy-btn" onclick="buy()">购买</button>
                        </div>
                    </div>
                </div>
                
                <div class="nft-card">
                    <div class="nft-image" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">🌊</div>
                    <div class="nft-info">
                        <h3>海洋之心</h3>
                        <p class="creator">@OceanArt</p>
                        <div class="nft-price">
                            <span class="price">350 cETH</span>
                            <button class="buy-btn" onclick="buy()">购买</button>
                        </div>
                    </div>
                </div>
                
                <div class="nft-card">
                    <div class="nft-image" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">🌲</div>
                    <div class="nft-info">
                        <h3>森林精灵</h3>
                        <p class="creator">@NatureNFT</p>
                        <div class="nft-price">
                            <span class="price">280 cETH</span>
                            <button class="buy-btn" onclick="buy()">购买</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function buy() {
            alert('购买NFT成功！\n\n实际项目调用智能合约');
        }
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
